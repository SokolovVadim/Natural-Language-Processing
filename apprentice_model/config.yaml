seed: 12345

dataset:
  name: SetFit/toxic_conversations
  text_column: text
  label_column: label

paths:
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  teacher_labels_dir: data/teacher_labels
  results_dir: results

subsets:
  train_size: 5000
  validation_size: 1000
  test_size: 1000
  sampling_strategy: stratified
  positive_label_ratio: 0.3

student_baseline:
  model_name: prajjwal1/bert-tiny
  max_length: 128
  batch_size: 16
  learning_rate: 0.00002
  epochs: 3
  num_labels: 2
